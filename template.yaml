AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Adaptive Concept Gap Detector & AI Study Assistant

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref StudyAssistantTable
        BUCKET_NAME: !Ref MaterialsBucket
        BEDROCK_MODEL_ID: !Ref BedrockModelId

Parameters:
  BedrockModelId:
    Type: String
    Default: amazon.titan-text-express-v1
    Description: Amazon Bedrock model ID to use for AI inference

Resources:

  # ── Shared layer (shared/ utilities) ──────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: study-assistant-shared
      Description: Shared utilities for the Study Assistant Lambdas
      ContentUri: layer/
      CompatibleRuntimes:
        - python3.13
    Metadata:
      BuildMethod: python3.13

  # ── Shared utilities layer (python path fix) ───────────────────────────────
  # Note: shared/ is copied into each Lambda's CodeUri via build process

  # ── S3 bucket for raw study materials ─────────────────────────────────────
  MaterialsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "study-assistant-materials-${AWS::AccountId}-${AWS::Region}"
      VersioningConfiguration:
        Status: Enabled

  # ── DynamoDB single-table ──────────────────────────────────────────────────
  StudyAssistantTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: study-assistant
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S

  # ── API Gateway ────────────────────────────────────────────────────────────
  StudyAssistantApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: study-assistant-api
      StageName: prod
      BinaryMediaTypes:
        - multipart/form-data
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,student-id,Student-Id,x-student-id,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  # ── Lambda: Material Processor ─────────────────────────────────────────────
  MaterialProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: study-assistant-material-processor
      CodeUri: lambdas/
      Handler: material_processor.handler
      Description: Validates, extracts, and stores uploaded study materials
      Policies:
        - S3WritePolicy:
            BucketName: !Ref MaterialsBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref StudyAssistantTable
      Events:
        UploadMaterial:
          Type: Api
          Properties:
            RestApiId: !Ref StudyAssistantApi
            Path: /materials
            Method: POST

  # ── Lambda: QA Engine ─────────────────────────────────────────────────────
  QAEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: study-assistant-qa-engine
      CodeUri: lambdas/
      Handler: qa_engine.handler
      Description: Answers student questions grounded in uploaded study materials
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StudyAssistantTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        AskQuestion:
          Type: Api
          Properties:
            RestApiId: !Ref StudyAssistantApi
            Path: /qa
            Method: POST

  # ── Lambda: Quiz Generator ────────────────────────────────────────────────
  QuizGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: study-assistant-quiz-generator
      CodeUri: lambdas/
      Handler: quiz_generator.handler
      Description: Generates multiple-choice quizzes from study materials via Bedrock
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StudyAssistantTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        GenerateQuiz:
          Type: Api
          Properties:
            RestApiId: !Ref StudyAssistantApi
            Path: /quizzes
            Method: POST

  # ── Lambda: Gap Detector ──────────────────────────────────────────────────
  GapDetectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: study-assistant-gap-detector
      CodeUri: lambdas/
      Handler: gap_detector.handler
      Description: Scores quiz submissions and tracks concept gaps
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StudyAssistantTable
      Events:
        SubmitQuiz:
          Type: Api
          Properties:
            RestApiId: !Ref StudyAssistantApi
            Path: /quizzes/{quiz_id}/submit
            Method: POST
        GetGaps:
          Type: Api
          Properties:
            RestApiId: !Ref StudyAssistantApi
            Path: /gaps
            Method: GET

  # ── Lambda: Explanation Engine ────────────────────────────────────────────
  ExplanationEngineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: study-assistant-explanation-engine
      CodeUri: lambdas/
      Handler: explanation_engine.handler
      Description: Generates targeted Bedrock explanations for concept gaps
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StudyAssistantTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        GetExplanation:
          Type: Api
          Properties:
            RestApiId: !Ref StudyAssistantApi
            Path: /explanations
            Method: POST

  # ── Lambda: Session Manager ───────────────────────────────────────────────
  SessionManagerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: study-assistant-session-manager
      CodeUri: lambdas/
      Handler: session_manager.handler
      Description: Returns a student's full session summary
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref StudyAssistantTable
      Events:
        GetSession:
          Type: Api
          Properties:
            RestApiId: !Ref StudyAssistantApi
            Path: /session
            Method: GET

Outputs:
  ApiUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${StudyAssistantApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  MaterialsBucketName:
    Description: S3 bucket for study materials
    Value: !Ref MaterialsBucket

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref StudyAssistantTable
